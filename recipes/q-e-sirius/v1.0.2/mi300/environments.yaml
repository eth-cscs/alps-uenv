gcc-env:
  compiler: [gcc, llvm-amdgpu]
  network:
      mpi: mpich+rocm
  unify: when_possible
  duplicates:
    strategy: full
  specs:
  - q-e-sirius@1.0.2 hdf5=parallel
  - sirius@7.10.0 +nlcglib +rocm +magma +apps +dlaf +elpa
  - nlcglib@1.3.0+gpu_direct~openmp
  - kokkos+serial
  - elpa ~rocm
  - spfft+gpu_direct
  - hip@7.1.0 ^mesa@23.3.6
  variants:
  - +mpi
  - +rocm
  - amdgpu_target=gfx942
  - amdgpu_target_sram_ecc=gfx942
  - ^python@3.12.12
  views:
    default:
      link: roots
      exclude: ["llvm"]
      uenv:
        add_compilers: true
        prefix_paths:
          LD_LIBRARY_PATH: [lib, lib64]
        env_vars:
          set:
          - FI_PROVIDER: "cxi"
          - MPIR_CVAR_CH4_OFI_ENABLE_HMEM: "1"
